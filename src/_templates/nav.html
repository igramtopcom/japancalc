<!-- ============================================================
     PART 1 — NAV PARTIAL
     japancalc.com — Global Navigation + Breadcrumb
     ============================================================ -->

<style>
  nav.site-nav.nav-open .nav-links {
    display: flex;
    flex-direction: column;
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--color-primary);
    padding: 1rem;
    gap: 0.5rem;
    z-index: 100;
  }
</style>

<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav" aria-label="Main navigation">
  <a href="/" class="nav-logo">JapanCalc</a>

  <ul class="nav-links" id="nav-links-menu">
    <li><a href="/date-calendar/">Date &amp; Calendar</a></li>
    <li><a href="/tax-finance/">Tax &amp; Finance</a></li>
    <li><a href="/language-tools/">Language Tools</a></li>
  </ul>

  <div style="display:flex;align-items:center;gap:0.5rem;">
    <button class="nav-lang-toggle"
            aria-label="Switch to Japanese"
            onclick="window.location.href='/ja'+window.location.pathname">
      日本語
    </button>
    <button class="nav-hamburger"
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="nav-links-menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>
</nav>

<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol>
    {{BREADCRUMB_HTML}}
  </ol>
</nav>

<script>
(function() {
  var btn = document.querySelector('.nav-hamburger');
  var nav = document.querySelector('.site-nav');
  if (!btn || !nav) return;
  btn.addEventListener('click', function() {
    var isOpen = nav.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', String(isOpen));
    btn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
  });
})();
</script>

    </p>

      Tax rates from National Tax Agency Japan.
    </p>
  </div>
</footer>

<script>
document.getElementById('footer-year').textContent = new Date().getFullYear();
</script>
