      <a href="/language-tools/" class="nav-link" {{NAV_ACTIVE_LANG}}>Language Tools</a>
    </div>

    <a href="{{LANG_TOGGLE_URL}}" class="nav-lang-toggle" aria-label="Switch to Japanese language version">EN | 日本語</a>

    <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-mobile-menu" id="nav-hamburger-btn">

    </button>
  </div>

</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('nav-hamburger-btn');
  var menu = document.getElementById('nav-mobile-menu');
  if (!btn || !menu) return;
  btn.addEventListener('click', function() {
    var open = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!open));
    menu.setAttribute('aria-hidden', String(open));
    if (open) { menu.setAttribute('hidden', ''); }
    else { menu.removeAttribute('hidden'); }
  });
});
</script>
